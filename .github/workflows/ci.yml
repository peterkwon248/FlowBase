# FlowBase CI — lint + tsc + vitest (Q2-fu2)
# 트리거: PR · main push. errors 0 강제.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint + TypeScript + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint flat config)
        run: npm run lint -- --max-warnings 50
        # max-warnings 50: 현재 16 warnings (unused imports 등) — 50 cap으로 신규 폭증 차단.
        # errors는 항상 0 강제 (ESLint default behavior).

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test
